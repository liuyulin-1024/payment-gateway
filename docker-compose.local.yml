x-common-env: &common-env
  # 数据库配置
  DATABASE_URL: ${DATABASE_URL:-}
  DB_HOST: ${DB_HOST:-db}
  DB_PORT: ${DB_PORT:-5432}
  DB_USER: ${DB_USER:-gateway}
  DB_PASSWORD: ${DB_PASSWORD:-dev_password}
  DB_NAME: ${DB_NAME:-gateway}
  DB_ECHO: ${DB_ECHO:-false}
  DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
  NEED_RESET_DATABASE: ${NEED_RESET_DATABASE:-false}
  # 支付渠道
  ALLOWED_PROVIDERS: ${ALLOWED_PROVIDERS:-stripe}
  # Stripe
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
  # 应用配置
  DEBUG: ${DEBUG:-false}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  PAYMENT_EXPIRE_MINUTES_DEFAULT: ${PAYMENT_EXPIRE_MINUTES_DEFAULT:-30}
  # 订阅配置
  SUBSCRIPTION_CHECKOUT_EXPIRE_MINUTES: ${SUBSCRIPTION_CHECKOUT_EXPIRE_MINUTES:-60}
  SUBSCRIPTION_SINGLE_ACTIVE: ${SUBSCRIPTION_SINGLE_ACTIVE:-true}
  SUBSCRIPTION_INCOMPLETE_CLEANUP_MINUTES: ${SUBSCRIPTION_INCOMPLETE_CLEANUP_MINUTES:-120}
  SUBSCRIPTION_CLEANUP_INTERVAL: ${SUBSCRIPTION_CLEANUP_INTERVAL:-300}

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    container_name: payment-gateway-db
    environment:
      POSTGRES_USER: ${DB_USER:-gateway}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-gateway}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # FastAPI 服务（API 入口）
  api:
    build: .
    image: payment-gateway:${IMAGE_TAG:-latest}
    container_name: payment-gateway-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      <<: *common-env
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read(); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped

  # WebhookDelivery Worker（异步投递与重试）
  worker:
    image: payment-gateway:${IMAGE_TAG:-latest}
    container_name: payment-gateway-worker
    command: ["python", "-m", "gateway.worker"]
    env_file:
      - .env
    environment:
      <<: *common-env
      DB_POOL_SIZE: ${DB_POOL_SIZE:-3}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-5}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-10}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-10}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
